<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Generator</title>

    <!-- Linking Icon Library -->

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/99ec8ca60f.js" crossorigin="anonymous"></script>


    <!-- Linking CSS Files -->

    <!-- This CSS File Includes The Styling of the Body Tag & Universal Styling Too -->
    <link rel="stylesheet" href="/CSS/style.css">

    <!-- This CSS File Includes The Styling of the Card -->
    <link rel="stylesheet" href="/CSS/card.css">

    <!-- This CSS File Includes Media Queries -->
    <link rel="stylesheet" href="/CSS/media.css">


    <!-- Linking JS Files -->

    <!-- This JS File Includes The Final Main Code In Action -->
    <script defer type="module" src="/JS/script.js"></script>

    <!-- This JS File Includes All The Elements Accessed In DOM -->
    <script defer type="module" src="/JS/dom.js"></script>

    <!-- This JS File Includes All The Functions Or Sub-Functions Used For The Card -->
    <script defer type="module" src="/JS/function.js"></script>

</head>

<body>

    <div id="card">

        <!-- This Is The Title -->
        <h1 id="title">Password Generator</h1>

        <!-- This Is The OutPut Password Section -->
        <div id="OutputPassword">
            <span id="password"></span> 
            <span id="copyBtn">
                <i id="fa-regular-fa-copy" class="fa-regular fa-copy" style="cursor: pointer; z-index: 999;"></i>
            </span>
        </div>

        <!-- This Is All Parameter Section For Generating Password -->
        <div id="passwordGeneratingParametersSection">

            <!-- Password Length Section -->
            <div id="passwordLengthSection">
                <span id="passwordLengthText">Password Length</span>
                <span>
                    <input type="range" id="passwordLengthSelectorRange" min="4" max="32" value="16">
                    <span id="passwordLengthDisplay">16 <!-- This is the length of the password selected --> </span>
                </span>
            </div>

            <!-- Include Uppercase Option Section -->
            <div class="OptionContaier">
                <input type="checkbox" id="IncludeUppercaseCheckbox" name="uppercase"><span id="IncludeUppercaseMsg">Inlcude Uppercase</span>
            </div>

            <!-- Include Lowercase Option Section -->
            <div class="OptionContaier">
                <input type="checkbox" id="IncludeLowercaseCheckbox" name="Lowercase"><span id="IncludeLowercaseMsg">Inlcude Lowercase</span>
            </div>

            <!-- Include Numbers Option Section -->
            <div class="OptionContaier">
                <input type="checkbox" id="IncludeNumberCheckbox" name="Number"><span id="IncludeNumberMsg">Inlcude Numbers</span>
            </div>

            <!-- Include Symbols Option Section -->
            <div class="OptionContaier">
                <input type="checkbox" id="IncludeSymbolCheckbox" name="Number"><span id="IncludeSymbolMsg">Inlcude Symbols</span>
            </div>

        </div>

        <!-- This Is Generate Password Button -->
        <button id="generatePasswordBtn"><i id="fa-solid-fa-key" class="fa-solid fa-key" style="color: rgb(255, 255, 255);"></i> <b>Generate Password</b></button>

        <!-- This Is Password Strength Section -->
        <div id="passwordStrengthSection">

            <div id="passwordStrengthMsgSection">
                <span id="passwordStrengthMsg">Password Strength:</span>
                <span id="passwordStrengthValue">Week</span>
            </div>

            <div id="passwordStrengthBarOutter">
                <div id="passwordStrengthBarInner"></div>
            </div>

        </div>

    </div>

    <div id="copyPopup">Copied!</div>
    
</body>

</html>
